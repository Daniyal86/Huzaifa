<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTQ Title Verification - Login</title>
    <!-- Modern Stack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- script removed -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/premium.css">
    <!-- Premium Loading Styles -->
    <style>
        :root {
            --font-heading: 'Playfair Display', serif;
            --font-family: 'Inter', sans-serif;
            --primary-color: #D4AF37;
        }

        /* --- LOADING SCREEN CONTAINER --- */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F8F5ED;
            /* Ivory */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Container */
        .shield-container {
            position: relative;
            width: 140px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        /* SVG Shield */
        .shield-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* 1. Shield Draw (0s - 0.45s) & Fill (0.45s - 0.75s) */
        .shield-path {
            stroke: url(#goldGradientMetal);
            stroke-width: 2.5px;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 450px;
            stroke-dashoffset: 450px;
            fill: url(#goldGradientLight);
            /* Soft gradient fill */
            fill-opacity: 0;
            animation: drawAndFillShield 0.75s ease-in-out forwards;
        }

        @keyframes drawAndFillShield {
            0% {
                stroke-dashoffset: 450px;
                fill-opacity: 0;
            }

            60% {
                stroke-dashoffset: 0;
                fill-opacity: 0;
            }

            100% {
                stroke-dashoffset: 0;
                fill-opacity: 0.15;
            }
        }

        /* 2. Scale Fade In (0.75s - 1.20s) */
        .scale-group {
            opacity: 0;
            animation: fadeScale 0.45s ease-out 0.75s forwards;
        }

        @keyframes fadeScale {
            to {
                opacity: 1;
            }
        }



        /* 3. Vertical Settle (1.20s - 1.50s) */
        .scale-pan-left,
        .scale-pan-right {
            transform: translateY(-3px);
            /* Start slightly raised */
            animation: verticalSettle 0.3s ease-out 1.2s forwards;
        }

        /* Transform Origins for Pivot Points (Updated for 3D Scale) */
        .scale-pan-left {
            transform-origin: 26px 36px;
        }

        .scale-pan-right {
            transform-origin: 74px 36px;
        }

        @keyframes verticalSettle {
            to {
                transform: translateY(0);
            }
        }

        /* 4. Text Fade In (1.50s - 1.80s) */
        .text-reveal-container {
            text-align: center;
            margin-top: 15px;
            opacity: 0;
            animation: fadeInText 0.3s ease-out 1.5s forwards;
        }

        .brand-title-main {
            font-family: var(--font-heading);
            color: #1E1E1E;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-subtitle-sub {
            font-family: var(--font-heading);
            color: #1E1E1E;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        @keyframes fadeInText {
            to {
                opacity: 1;
            }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D4AF37',
                        'primary-hover': '#bfa13f',
                        'bg-card': '#ffffff',
                        'text-main': '#1f2937',
                    }
                }
            }
        }
    </script>
</head>

<body class="login-page bg-[var(--bg-body)] h-screen flex items-center justify-center p-4">
    <div id="loginCard"
        class="login-box max-w-md w-full opacity-0 translate-y-8 bg-[var(--bg-card)] border border-[var(--border-subtle)] border-top-[4px] border-t-[var(--primary-color)] p-8 rounded-lg shadow-xl"
        x-data="{ userId: '' }">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-[var(--primary-color)] mb-2 font-['Playfair_Display']">MTQ Admin</h2>
            <p class="text-[var(--text-muted)]">Title Verification System</p>
        </div>

        <div class="mb-6">
            <label for="roleSelect" class="block mb-2 font-bold text-[var(--text-main)]">Select User Role</label>
            <select id="roleSelect" x-model="userId"
                class="w-full p-3 border border-[var(--border-subtle)] rounded-md bg-[var(--bg-input)] text-[var(--text-main)] focus:ring-2 focus:ring-[var(--primary-color)] outline-none transition-all">
                <option value="" disabled selected>Select a user...</option>
                <!-- Populated by JS -->
            </select>
        </div>

        <button id="loginBtn"
            class="w-full bg-[var(--primary-color)] hover:bg-[var(--primary-hover)] text-white font-bold py-3 px-6 rounded-md transition-all shadow-md active:scale-[0.98]">
            Login to Dashboard
        </button>
    </div>

    <!-- Loading Overlay -->
    <!-- Premier Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="shield-container">
            <svg class="shield-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- --- ADVANCED GOLD GRADIENTS (3D Realism) --- -->

                    <!-- 1. Metallic Gold Body (Vertical) -->
                    <linearGradient id="goldBody" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" /> <!-- Highlight Top -->
                        <stop offset="20%" style="stop-color:#D4AF37;stop-opacity:1" /> <!-- Main Gold -->
                        <stop offset="50%" style="stop-color:#B49129;stop-opacity:1" /> <!-- Shadow Mid -->
                        <stop offset="80%" style="stop-color:#F59E0B;stop-opacity:1" /> <!-- Reflective Warmth -->
                        <stop offset="100%" style="stop-color:#785A18;stop-opacity:1" /> <!-- Deep Shadow Base -->
                    </linearGradient>

                    <!-- 2. Metallic Rim Highlight (Horizontal Shine) -->
                    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#926F34;stop-opacity:1" />
                        <stop offset="15%" style="stop-color:#FFD700;stop-opacity:1" /> <!-- Specular Shine -->
                        <stop offset="30%" style="stop-color:#D4AF37;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#FDE68A;stop-opacity:1" /> <!-- Center Highlight -->
                        <stop offset="70%" style="stop-color:#D4AF37;stop-opacity:1" />
                        <stop offset="85%" style="stop-color:#FFD700;stop-opacity:1" /> <!-- Specular Shine -->
                        <stop offset="100%" style="stop-color:#926F34;stop-opacity:1" />
                    </linearGradient>

                    <!-- 3. Deep Recessed Shadow (Inner parts) -->
                    <linearGradient id="goldShadow" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#5E4615;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#8C6A28;stop-opacity:1" />
                    </linearGradient>

                    <!-- 4. Chain Texture (Vertical Pattern) -->
                    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#8C6A28" />
                        <stop offset="40%" style="stop-color:#FDE68A" /> <!-- Specular Link -->
                        <stop offset="60%" style="stop-color:#D4AF37" />
                        <stop offset="100%" style="stop-color:#5E4615" />
                    </linearGradient>

                    <!-- 5. Shield Body (Retained for Context) -->
                    <linearGradient id="shieldBodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:0.4" />
                        <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.1" />
                    </linearGradient>

                    <!-- Filters for Depth -->
                    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
                        <feOffset dx="0" dy="1" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.3" /> <!-- Subtle spread -->
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                    <clipPath id="shieldInner">
                        <path d="M50 7 L92 21 V50 Q92 90 50 110 Q8 90 8 50 V21 Z" />
                    </clipPath>
                </defs>

                <!-- === SHIELD CONTAINER === -->
                <!-- Outline -->
                <path class="shield-path" d="M50 5 L95 20 V50 Q95 95 50 115 Q5 95 5 50 V20 Z"
                    style="stroke: url(#goldBody); stroke-width: 3px; fill: url(#shieldBodyGradient);" />

                <!-- === 3D SCALE GROUP === -->
                <g class="scale-group" clip-path="url(#shieldInner)"
                    style="filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2));">

                    <!-- 1. BASE: Detailed Column with Steps -->
                    <!-- Bottom Step -->
                    <path d="M40 85 L60 85 L58 80 H42 Z" fill="url(#goldBody)" />
                    <!-- Column (Tapered) -->
                    <path d="M48 80 L52 80 L51 32 L49 32 Z" fill="url(#goldRim)" />

                    <!-- 2. BEAM: Curved & Ornamental -->
                    <!-- Main Crossbar (Curved) -->
                    <path d="M25 35 Q50 25 75 35 L75 38 Q50 30 25 38 Z" fill="url(#goldRim)" />
                    <!-- Center Ornament (Diamond & Circle Finial) -->
                    <path d="M50 24 L54 29 L50 34 L46 29 Z" fill="url(#goldBody)" /> <!-- Diamond Top -->
                    <circle cx="50" cy="33" r="3" fill="url(#goldShadow)" stroke="url(#goldRim)" stroke-width="1.5" />
                    <!-- Pivot Pin -->

                    <!-- 3. CHAINS: Fine Metallic Lines -->
                    <!-- Left Chains -->
                    <g class="scale-pan-left">
                        <!-- Front Chain -->
                        <line x1="26" y1="36" x2="20" y2="60" stroke="url(#chainGradient)" stroke-width="0.8"
                            stroke-dasharray="1,0.5" />
                        <!-- Back Chain -->
                        <line x1="26" y1="36" x2="32" y2="60" stroke="url(#chainGradient)" stroke-width="0.8"
                            stroke-dasharray="1,0.5" />
                        <!-- Center decorative chain -->
                        <line x1="26" y1="36" x2="26" y2="58" stroke="url(#chainGradient)" stroke-width="0.5"
                            stroke-opacity="0.7" />

                        <!-- Left Pan: 3D Bowl -->
                        <!-- Outer Bowl (Shadow/Depth) -->
                        <path d="M18 60 Q26 72 34 60 Z" fill="url(#goldShadow)" />
                        <!-- Inner/Rim Highlight -->
                        <path d="M18 60 Q26 70 34 60 Q26 63 18 60" fill="url(#goldRim)" />
                    </g>

                    <!-- Right Chains -->
                    <g class="scale-pan-right">
                        <!-- Front Chain -->
                        <line x1="74" y1="36" x2="68" y2="60" stroke="url(#chainGradient)" stroke-width="0.8"
                            stroke-dasharray="1,0.5" />
                        <!-- Back Chain -->
                        <line x1="74" y1="36" x2="80" y2="60" stroke="url(#chainGradient)" stroke-width="0.8"
                            stroke-dasharray="1,0.5" />
                        <!-- Center -->
                        <line x1="74" y1="36" x2="74" y2="58" stroke="url(#chainGradient)" stroke-width="0.5"
                            stroke-opacity="0.7" />

                        <!-- Right Pan: 3D Bowl -->
                        <path d="M66 60 Q74 72 82 60 Z" fill="url(#goldShadow)" />
                        <path d="M66 60 Q74 70 82 60 Q74 63 66 60" fill="url(#goldRim)" />
                    </g>
                </g>
            </svg>
        </div>

        <div class="text-reveal-container">
            <h1 class="brand-title-main">MTQ ASSOCIATES</h1>
            <div class="brand-subtitle-sub">TITLE VERIFICATION</div>
        </div>
    </div>

    <!-- FontAwesome for the logo placeholder -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        const select = document.getElementById('roleSelect');
        const loginBtn = document.getElementById('loginBtn');
        const loginCard = document.getElementById('loginCard');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Fetch Users & Init
        async function init() {
            try {
                const res = await fetch('/api/users');
                if (!res.ok) throw new Error('Failed to fetch users');
                const users = await res.json();

                users.forEach(user => {
                    const opt = document.createElement('option');
                    opt.value = user.id;
                    opt.textContent = `${user.name} (${user.roleLabel})`;
                    opt.dataset.user = JSON.stringify(user);
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Login Init Error:', err);
                // Fallback or Alert?
                const opt = document.createElement('option');
                opt.textContent = "Error loading users";
                select.appendChild(opt);
            }
        }

        // GSAP Entrance Animation
        window.addEventListener('DOMContentLoaded', () => {
            init();
            gsap.to(loginCard, {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: 'power3.out'
            });
        });

        // Login Action
        loginBtn.addEventListener('click', () => {
            const userId = select.value;
            if (userId && !userId.startsWith('Select')) {
                const opt = select.selectedOptions[0];
                if (opt.dataset.user) {
                    const user = JSON.parse(opt.dataset.user);
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    // 1. Exit Card Animation
                    gsap.to(loginCard, {
                        opacity: 0,
                        scale: 0.9,
                        duration: 0.4,
                        ease: 'power2.in',
                        onComplete: () => {
                            // 2. Show Loading Overlay
                            loadingOverlay.classList.remove('hidden');

                            // 3. Simulated Loading Delay
                            setTimeout(() => {
                                window.location.href = 'dashboard.html';
                            }, 2500);
                        }
                    });
                }
            } else {
                alert('Please select a user');
            }
        });
    </script>
</body>

</html>
